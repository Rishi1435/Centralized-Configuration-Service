server:
  port: 8888
spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${SPRING_CLOUD_CONFIG_SERVER_GIT_URI:file:///${user.dir}/../config-repo}
          default-label: master
management:
  endpoints:
    web:
      exposure:
        include: health
